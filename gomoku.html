<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>五子棋 - 联机对战</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cell: 40px;
  --padding: 20px;
  --board-size: calc(var(--cell) * 14 + var(--padding) * 2);
}

html { overflow-x: hidden; }

body {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  overflow-x: hidden;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 16px;
  width: 100%;
  max-width: 700px;
}

h1 {
  color: #fff;
  font-size: clamp(22px, 5vw, 36px);
  text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
  letter-spacing: 8px;
}

.info-bar {
  display: flex;
  align-items: center;
  gap: clamp(10px, 3vw, 30px);
  flex-wrap: wrap;
  justify-content: center;
}

.player-tag {
  display: flex;
  align-items: center;
  gap: clamp(4px, 1.5vw, 10px);
  padding: clamp(6px, 1.5vw, 10px) clamp(12px, 3vw, 24px);
  border-radius: 40px;
  font-size: clamp(12px, 2.5vw, 16px);
  font-weight: 600;
  color: #fff;
  transition: all 0.3s;
}

.player-tag.black {
  background: linear-gradient(135deg, #2d2d2d, #555);
  border: 2px solid #666;
}

.player-tag.white {
  background: linear-gradient(135deg, #e8e8e8, #fff);
  border: 2px solid #ccc;
  color: #333;
}

.player-tag.active {
  box-shadow: 0 0 20px rgba(255, 215, 0, 0.7);
  border-color: gold;
  transform: scale(1.08);
}

.stone-icon {
  width: clamp(14px, 3vw, 22px);
  height: clamp(14px, 3vw, 22px);
  border-radius: 50%;
  display: inline-block;
}

.stone-icon.black {
  background: radial-gradient(circle at 35% 35%, #555, #111);
  box-shadow: 1px 1px 3px rgba(0,0,0,0.5);
}

.stone-icon.white {
  background: radial-gradient(circle at 35% 35%, #fff, #ccc);
  box-shadow: 1px 1px 3px rgba(0,0,0,0.3);
}

#status {
  font-size: clamp(14px, 3vw, 20px);
  color: #ffd700;
  font-weight: 700;
  min-height: 24px;
  text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
}

.board-wrapper {
  position: relative;
  padding: clamp(10px, 2.5vw, 28px);
  border-radius: 12px;
  background: linear-gradient(145deg, #c6943e, #dbb060);
  box-shadow:
    0 10px 40px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.2),
    0 0 60px rgba(198, 148, 62, 0.3);
  max-width: 100%;
}

canvas {
  display: block;
  cursor: pointer;
  border-radius: 4px;
  width: min(640px, calc(100vw - 60px));
  height: min(640px, calc(100vw - 60px));
}

.btn-row {
  display: flex;
  gap: clamp(8px, 2vw, 16px);
  flex-wrap: wrap;
  justify-content: center;
}

button {
  padding: clamp(8px, 2vw, 12px) clamp(16px, 4vw, 36px);
  border: none;
  border-radius: 40px;
  font-size: clamp(12px, 2.5vw, 15px);
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 2px;
}

#restartBtn {
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #333;
  box-shadow: 0 4px 15px rgba(247, 151, 30, 0.4);
}

#restartBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(247, 151, 30, 0.6); }

#undoBtn {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
}

#undoBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6); }

#surrenderBtn {
  background: linear-gradient(135deg, #e74c3c, #c0392b);
  color: #fff;
  box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
}

#surrenderBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(231, 76, 60, 0.6); }

.role-badge {
  position: fixed;
  top: 10px;
  right: 10px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: clamp(10px, 2vw, 14px);
  font-weight: 600;
  color: #fff;
  z-index: 10;
}

.role-badge.p1 { background: linear-gradient(135deg, #e74c3c, #c0392b); }
.role-badge.p2 { background: linear-gradient(135deg, #3498db, #2980b9); }
.role-badge.waiting { background: linear-gradient(135deg, #95a5a6, #7f8c8d); }

.particles {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: -1;
}

.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 50%;
  animation: float linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
}

.overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
  z-index: 100;
  backdrop-filter: blur(4px);
  padding: 20px;
}

.overlay.show { display: flex; }

.win-card {
  background: linear-gradient(145deg, #1a1a2e, #16213e);
  padding: clamp(30px, 6vw, 50px) clamp(24px, 6vw, 60px);
  border-radius: 20px;
  text-align: center;
  border: 1px solid rgba(255,215,0,0.3);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  animation: popIn 0.4s ease;
  max-width: 400px;
  width: 100%;
}

@keyframes popIn {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

.win-card h2 { color: #ffd700; font-size: clamp(20px, 5vw, 32px); margin-bottom: 10px; }
.win-card p { color: #aaa; font-size: clamp(13px, 3vw, 16px); margin-bottom: 24px; }
.win-card button {
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #333;
  padding: 14px 48px;
  font-size: 16px;
}

.connection-status {
  position: fixed;
  top: 10px;
  left: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: clamp(10px, 2vw, 13px);
  color: #aaa;
  z-index: 10;
}

.conn-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #e74c3c;
  transition: background 0.3s;
}

.conn-dot.online { background: #2ecc71; }

.lobby-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.88);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 200;
  backdrop-filter: blur(8px);
  padding: 16px;
  overflow-y: auto;
}

.lobby-card {
  background: linear-gradient(145deg, #1a1a2e, #16213e);
  padding: clamp(24px, 5vw, 44px) clamp(20px, 5vw, 56px);
  border-radius: 20px;
  text-align: center;
  border: 1px solid rgba(255,215,0,0.3);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  animation: popIn 0.4s ease;
  width: 100%;
  max-width: 420px;
}

.lobby-card h2 {
  color: #fff;
  font-size: clamp(20px, 5vw, 28px);
  margin-bottom: 6px;
  letter-spacing: 4px;
}

.lobby-card .subtitle {
  color: #888;
  font-size: clamp(11px, 2.5vw, 14px);
  margin-bottom: 24px;
}

.lobby-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 24px;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.1);
}

.lobby-tab {
  flex: 1;
  padding: 12px 0;
  font-size: clamp(13px, 2.5vw, 15px);
  font-weight: 600;
  color: #888;
  background: rgba(255,255,255,0.03);
  cursor: pointer;
  transition: all 0.3s;
  border: none;
  letter-spacing: 1px;
}

.lobby-tab.active {
  color: #fff;
  background: rgba(255,215,0,0.12);
}

.lobby-panel { display: none; }
.lobby-panel.active { display: block; }

.lobby-panel .section-label {
  color: #aaa;
  font-size: 13px;
  margin-bottom: 12px;
}

.room-code-display {
  background: rgba(255,215,0,0.1);
  border: 2px dashed rgba(255,215,0,0.4);
  border-radius: 12px;
  padding: 16px 24px;
  margin-bottom: 16px;
}

.room-code-display .code {
  font-size: clamp(24px, 6vw, 32px);
  font-weight: 800;
  color: #ffd700;
  letter-spacing: 6px;
  font-family: 'Courier New', monospace;
}

.room-code-display .hint {
  font-size: 12px;
  color: #888;
  margin-top: 6px;
}

.role-select-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 20px;
}

.role-choice {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: clamp(12px, 3vw, 16px) clamp(16px, 4vw, 28px);
  border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.03);
  cursor: pointer;
  transition: all 0.3s;
}

.role-choice:hover { border-color: rgba(255,215,0,0.3); }

.role-choice.selected {
  border-color: gold;
  background: rgba(255,215,0,0.1);
  box-shadow: 0 0 20px rgba(255,215,0,0.15);
}

.role-choice .stone-sm {
  width: 36px;
  height: 36px;
  border-radius: 50%;
}

.role-choice .stone-sm.black {
  background: radial-gradient(circle at 35% 35%, #555, #111);
  box-shadow: 1px 1px 4px rgba(0,0,0,0.5);
}

.role-choice .stone-sm.white {
  background: radial-gradient(circle at 35% 35%, #fff, #bbb);
  box-shadow: 1px 1px 4px rgba(0,0,0,0.3);
}

.role-choice .role-label {
  color: #fff;
  font-size: 14px;
  font-weight: 600;
}

.lobby-input {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 14px 20px;
  font-size: clamp(18px, 4vw, 22px);
  font-weight: 700;
  color: #fff;
  text-align: center;
  letter-spacing: 6px;
  width: 100%;
  max-width: 200px;
  font-family: 'Courier New', monospace;
  outline: none;
  text-transform: uppercase;
  transition: border-color 0.3s;
  margin-bottom: 16px;
}

.lobby-input:focus { border-color: rgba(255,215,0,0.5); }

.lobby-input::placeholder {
  color: rgba(255,255,255,0.2);
  letter-spacing: 2px;
  font-size: 14px;
  font-weight: 400;
}

.lobby-btn {
  padding: 14px 44px;
  border: none;
  border-radius: 40px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 2px;
}

.lobby-btn.primary {
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #333;
  box-shadow: 0 4px 15px rgba(247, 151, 30, 0.4);
}

.lobby-btn.primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(247, 151, 30, 0.6);
}

.lobby-btn.primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.lobby-msg {
  font-size: 13px;
  color: #e74c3c;
  margin-top: 12px;
  min-height: 20px;
}

.lobby-msg.success { color: #2ecc71; }

.waiting-msg {
  color: #aaa;
  font-size: 14px;
  margin-top: 12px;
}

.waiting-msg .dot-anim::after {
  content: '';
  animation: dots 1.5s steps(4, end) infinite;
}

@keyframes dots {
  0% { content: ''; }
  25% { content: '.'; }
  50% { content: '..'; }
  75% { content: '...'; }
}

.room-id-display {
  position: fixed;
  top: 40px;
  right: 10px;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: clamp(9px, 2vw, 12px);
  color: #888;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  z-index: 10;
}

.hidden { display: none !important; }

.copy-btn {
  background: none;
  border: 1px solid rgba(255,215,0,0.3);
  color: #ffd700;
  padding: 6px 16px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}

.copy-btn:hover { background: rgba(255,215,0,0.1); }

.server-status {
  position: fixed;
  bottom: 10px;
  left: 10px;
  font-size: clamp(9px, 2vw, 12px);
  color: #666;
}

@media (max-width: 480px) {
  .container { gap: 10px; padding: 10px; }
  .board-wrapper { padding: 8px; }
  canvas {
    width: calc(100vw - 36px);
    height: calc(100vw - 36px);
  }
  .btn-row { gap: 6px; }
  button { padding: 8px 16px; font-size: 12px; letter-spacing: 1px; }
  .emoji-btn { width: 34px; height: 34px; font-size: 18px; }
  .emoji-row { gap: 4px; }
  .lobby-card { padding: 20px 16px; }
  .role-select-row { gap: 8px; }
  .role-choice { padding: 12px 16px; }
}

.emoji-row {
  display: flex;
  gap: clamp(6px, 1.5vw, 12px);
  flex-wrap: wrap;
  justify-content: center;
}
.emoji-btn {
  width: clamp(36px, 8vw, 48px);
  height: clamp(36px, 8vw, 48px);
  border: none;
  border-radius: 50%;
  font-size: clamp(18px, 4vw, 26px);
  cursor: pointer;
  background: rgba(255, 255, 255, 0.08);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  letter-spacing: 0;
  -webkit-tap-highlight-color: transparent;
}
.emoji-btn:hover { transform: scale(1.2); background: rgba(255, 255, 255, 0.15); }
.emoji-btn:active { transform: scale(0.9); }

.emoji-bubble {
  position: absolute;
  font-size: clamp(48px, 12vw, 80px);
  pointer-events: none;
  z-index: 50;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  animation: emojiFloat 3s ease-out forwards;
  text-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
}

.character-panel {
  display: flex;
  align-items: center;
  gap: clamp(8px, 2vw, 14px);
  padding: clamp(8px, 2vw, 12px) clamp(12px, 3vw, 20px);
  border-radius: 16px;
  background: rgba(255,255,255,0.06);
  border: 2px solid rgba(255,255,255,0.1);
  position: relative;
  min-width: 140px;
  transition: all 0.3s;
}
.character-panel.active-turn {
  border-color: rgba(255,255,255,0.15);
}
.character-avatar {
  font-size: clamp(28px, 6vw, 40px);
  line-height: 1;
  flex-shrink: 0;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: clamp(44px, 9vw, 60px);
  height: clamp(44px, 9vw, 60px);
  border-radius: 50%;
  transition: transform 0.3s;
}
.character-panel.active-turn .character-avatar::before {
  content: '';
  position: absolute;
  top: -4px; left: -4px;
  width: calc(100% + 8px);
  height: calc(100% + 8px);
  border-radius: 50%;
  border: 2px solid transparent;
  border-top-color: #ffd700;
  animation: borderOrbit 1.2s linear infinite;
  pointer-events: none;
}
@keyframes borderOrbit {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.character-info {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
}
.character-name {
  color: #ffd700;
  font-size: clamp(12px, 2.5vw, 15px);
  font-weight: 700;
}
.character-title {
  color: #888;
  font-size: clamp(10px, 2vw, 12px);
}
.character-panel.active-turn .character-name {
  color: #fff;
  text-shadow: 0 0 8px rgba(255,215,0,0.5);
}

.avatar-play {
  animation: avatarPlay 0.6s ease;
}
@keyframes avatarPlay {
  0% { transform: rotate(0deg) scale(1); }
  25% { transform: rotate(-15deg) scale(1.2); }
  50% { transform: rotate(10deg) scale(1.15); }
  75% { transform: rotate(-5deg) scale(1.05); }
  100% { transform: rotate(0deg) scale(1); }
}

.char-speech-bubble {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  color: #ffd700;
  padding: 6px 14px;
  border-radius: 12px;
  font-size: clamp(12px, 2.5vw, 14px);
  font-weight: 600;
  white-space: nowrap;
  pointer-events: none;
  z-index: 60;
  animation: speechIn 0.3s ease, speechOut 0.3s ease 2s forwards;
  border: 1px solid rgba(255,215,0,0.3);
}
.char-speech-bubble::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 6px solid transparent;
  border-top-color: rgba(0,0,0,0.85);
}
@keyframes speechIn {
  0% { opacity: 0; transform: translateX(-50%) translateY(8px) scale(0.8); }
  100% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
}
@keyframes speechOut {
  0% { opacity: 1; }
  100% { opacity: 0; }
}

.char-reveal-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.9);
  backdrop-filter: blur(10px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 400;
  animation: revealFadeIn 0.4s ease;
  padding: 20px;
}
@keyframes revealFadeIn {
  0% { opacity: 0; }
  100% { opacity: 1; }
}
.char-reveal-overlay.fade-out {
  animation: revealFadeOut 0.5s ease forwards;
}
@keyframes revealFadeOut {
  0% { opacity: 1; }
  100% { opacity: 0; }
}
.char-reveal-card {
  background: linear-gradient(145deg, #1a1a2e, #16213e);
  border: 1px solid rgba(255, 215, 0, 0.4);
  border-radius: 24px;
  padding: clamp(30px, 8vw, 50px) clamp(40px, 10vw, 80px);
  text-align: center;
  box-shadow: 0 0 80px rgba(255, 215, 0, 0.15), 0 20px 60px rgba(0, 0, 0, 0.5);
  animation: cardSlideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  max-width: 400px;
  width: 100%;
}
@keyframes cardSlideIn {
  0% { transform: translateY(60px) scale(0.9); opacity: 0; }
  100% { transform: translateY(0) scale(1); opacity: 1; }
}
.char-reveal-emoji {
  font-size: clamp(60px, 16vw, 100px);
  line-height: 1;
  margin-bottom: 16px;
  animation: emojiRevealPulse 0.6s ease 0.3s both;
}
@keyframes emojiRevealPulse {
  0% { transform: scale(0.5); }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
.char-reveal-title {
  color: #888;
  font-size: clamp(12px, 3vw, 15px);
  margin-bottom: 8px;
  letter-spacing: 2px;
  animation: textFadeIn 0.4s ease 0.2s both;
}
.char-reveal-name {
  color: #ffd700;
  font-size: clamp(28px, 7vw, 40px);
  font-weight: 800;
  letter-spacing: 4px;
  margin-bottom: 20px;
  text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
  animation: textFadeIn 0.4s ease 0.35s both;
}
@keyframes textFadeIn {
  0% { transform: translateY(10px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}
.char-reveal-divider {
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.5), transparent);
  margin: 0 auto 20px;
  animation: textFadeIn 0.4s ease 0.5s both;
}
.char-reveal-line {
  color: #ccc;
  font-size: clamp(14px, 3.5vw, 18px);
  font-style: italic;
  font-weight: 500;
  letter-spacing: 1px;
  animation: textFadeIn 0.4s ease 0.6s both;
}
.char-reveal-hint {
  color: #555;
  font-size: clamp(11px, 2.5vw, 13px);
  margin-top: 30px;
  animation: textFadeIn 0.4s ease 0.8s both;
}
@keyframes emojiFloat {
  0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
  15%  { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
  30%  { transform: translate(-50%, -50%) scale(1); }
  70%  { opacity: 1; transform: translate(-50%, -70%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -100%) scale(0.8); }
}

.toast {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  color: #ffd700;
  padding: 12px 28px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  z-index: 300;
  pointer-events: none;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
}
@keyframes toastIn { 0% { opacity:0; transform: translateX(-50%) translateY(-20px); } 100% { opacity:1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { 0% { opacity:1; } 100% { opacity:0; } }

.confirm-overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.6);
  display: flex; justify-content: center; align-items: center;
  z-index: 250; backdrop-filter: blur(4px); padding: 20px;
}
.confirm-card {
  background: linear-gradient(145deg, #1a1a2e, #16213e);
  padding: 30px 40px;
  border-radius: 20px;
  text-align: center;
  border: 1px solid rgba(255,215,0,0.3);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  animation: popIn 0.3s ease;
  max-width: 360px;
  width: 100%;
}
.confirm-card h3 { color: #fff; font-size: 18px; margin-bottom: 20px; }
.confirm-card .confirm-btns { display: flex; gap: 12px; justify-content: center; }
.confirm-card .confirm-btns button {
  padding: 10px 32px; border: none; border-radius: 30px;
  font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s;
}
.confirm-card .btn-yes { background: linear-gradient(135deg, #2ecc71, #27ae60); color: #fff; }
.confirm-card .btn-yes:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(46,204,113,0.5); }
.confirm-card .btn-no { background: linear-gradient(135deg, #e74c3c, #c0392b); color: #fff; }
.confirm-card .btn-no:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(231,76,60,0.5); }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="connection-status">
  <div class="conn-dot" id="connDot"></div>
  <span id="connText">未连接</span>
</div>

<div class="role-badge waiting" id="roleBadge">等待加入...</div>
<div class="room-id-display hidden" id="roomIdDisplay"></div>

<div class="lobby-overlay" id="lobbyOverlay">
  <div class="lobby-card">
    <h2>五子棋联机</h2>
    <p class="subtitle">创建或加入房间，与好友对战</p>

    <div class="lobby-tabs">
      <button class="lobby-tab active" onclick="switchTab('create')">创建房间</button>
      <button class="lobby-tab" onclick="switchTab('join')">加入房间</button>
    </div>

    <div class="lobby-panel active" id="panelCreate">
      <div class="section-label">选择你的执棋</div>
      <div class="role-select-row">
        <div class="role-choice selected" id="choiceBlack" onclick="pickRole(1)">
          <div class="stone-sm black"></div>
          <span class="role-label">黑棋（先手）</span>
        </div>
        <div class="role-choice" id="choiceWhite" onclick="pickRole(2)">

      <div class="lobby-msg" id="joinMsg"></div>

</div>

<div class="container">
  <h1>五 子 棋</h1>

  <div class="info-bar">
    <div class="character-panel" id="panelBlack">
      <div class="character-avatar" id="avatarBlack">♟️</div>
      <div class="character-info">
        <div class="character-name" id="nameBlack">黑棋</div>
        <div class="character-title" id="titleBlack">等待中...</div>

    </div>
    <div id="status">等待连接...</div>
    <div class="character-panel" id="panelWhite">
      <div class="character-avatar" id="avatarWhite">♟️</div>
      <div class="character-info">
        <div class="character-name" id="nameWhite">白棋</div>
        <div class="character-title" id="titleWhite">等待中...</div>
      </div>

  <div class="board-wrapper">

  </div>

  <div class="btn-row">

    <button class="emoji-btn" onclick="sendEmoji('🤔')">🤔</button>
    <button class="emoji-btn" onclick="sendEmoji('👍')">👍</button>
    <button class="emoji-btn" onclick="sendEmoji('😤')">😤</button>
    <button class="emoji-btn" onclick="sendEmoji('🎉')">🎉</button>
    <button class="emoji-btn" onclick="sendEmoji('🔥')">🔥</button>
    <button class="emoji-btn" onclick="sendEmoji('😎')">😎</button>
    <button class="emoji-btn" onclick="sendEmoji('👏')">👏</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="win-card">
    <h2 id="winTitle">黑棋获胜！</h2>
    <p id="winSub">精彩的对局</p>
    <button onclick="requestRematch()">再来一局</button>
  </div>
</div>

<div class="server-status" id="serverStatus">服务器: 未连接</div>

<script>
const SIZE = 15;
const INTERNAL_SIZE = 640;
const CELL = 40;
const PADDING = 20;

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
canvas.width = canvas.height = INTERNAL_SIZE;

let board = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
let myRole = null;
let currentTurn = 1;
let gameOver = false;
let moveHistory = [];
let opponentConnected = false;
let lastMove = null;
let ws = null;
let roomId = '';
let selectedRole = 1;
let myCharacter = null;
let opponentCharacter = null;

const SoundEngine = {
  ctx: null,
  initialized: false,
  init() {
    if (this.initialized) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.initialized = true;
  },
  playStone() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const bufferSize = this.ctx.sampleRate * 0.05;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 3);
    }
    const noise = this.ctx.createBufferSource();
    noise.buffer = buffer;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 800;
    filter.Q.value = 1.5;
    const noiseGain = this.ctx.createGain();
    noiseGain.gain.setValueAtTime(0.6, t);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    noise.connect(filter).connect(noiseGain).connect(this.ctx.destination);
    noise.start(t);
    noise.stop(t + 0.08);
    const osc = this.ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(180, t);
    osc.frequency.exponentialRampToValueAtTime(60, t + 0.1);
    const oscGain = this.ctx.createGain();
    oscGain.gain.setValueAtTime(0.5, t);
    oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc.connect(oscGain).connect(this.ctx.destination);
    osc.start(t);
    osc.stop(t + 0.15);
  },
  playWin() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const notes = [523.25, 659.25, 783.99, 1046.50];
    notes.forEach((freq, i) => {
      const osc = this.ctx.createOscillator();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const gain = this.ctx.createGain();
      const start = t + i * 0.15;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.35, start + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, start + 0.4);
      osc.connect(gain).connect(this.ctx.destination);
      osc.start(start);
      osc.stop(start + 0.4);
    });
  },
  playDisconnect() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const notes = [880, 660];
    notes.forEach((freq, i) => {
      const osc = this.ctx.createOscillator();
      osc.type = 'square';
      osc.frequency.value = freq;
      const gain = this.ctx.createGain();
      const start = t + i * 0.2;
      gain.gain.setValueAtTime(0.15, start);
      gain.gain.exponentialRampToValueAtTime(0.001, start + 0.15);
      osc.connect(gain).connect(this.ctx.destination);
      osc.start(start);
      osc.stop(start + 0.15);
    });
  },
  playRestart() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(300, t);
    osc.frequency.exponentialRampToValueAtTime(900, t + 0.25);
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.25, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.connect(gain).connect(this.ctx.destination);
    osc.start(t);
    osc.stop(t + 0.3);
  }
};

function initSoundOnGesture() {
  SoundEngine.init();
  document.removeEventListener('click', initSoundOnGesture);
  document.removeEventListener('touchstart', initSoundOnGesture);
}
document.addEventListener('click', initSoundOnGesture);
document.addEventListener('touchstart', initSoundOnGesture);

function generateCode() {
  let code = '';
  for (let i = 0; i < 4; i++) code += Math.floor(Math.random() * 10);
  return code;
}

function connectServer() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${protocol}//${location.host}`);

  ws.onopen = () => {
    document.getElementById('serverStatus').textContent = '服务器: 已连接';
  };

  ws.onmessage = (e) => handleMessage(JSON.parse(e.data));

  ws.onclose = () => {
    document.getElementById('serverStatus').textContent = '服务器: 已断开';
    setTimeout(connectServer, 3000);
  };

  ws.onerror = () => {};
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'room_created':
      myCharacter = msg.character;
      showRoomCreated(msg.roomId, msg.role);
      break;

    case 'guest_joined':
      opponentConnected = true;
      opponentCharacter = msg.opponentCharacter;
      updateCharacterDisplay();
      updateConnection(true);
      updateRoleBadge();
      document.getElementById('lobbyOverlay').classList.add('hidden');
      showCharacterReveal(myCharacter);
      draw();
      updateStatus();
      break;

    case 'room_joined':
      myRole = msg.role;
      myCharacter = msg.character;
      opponentCharacter = msg.opponentCharacter;
      opponentConnected = true;
      updateCharacterDisplay();
      updateConnection(true);
      updateRoleBadge();
      document.getElementById('roomIdDisplay').textContent = '房间: ' + msg.roomId;
      document.getElementById('roomIdDisplay').classList.remove('hidden');
      document.getElementById('lobbyOverlay').classList.add('hidden');
      showCharacterReveal(myCharacter);
      draw();
      updateStatus();
      break;

    case 'move':
      board[msg.r][msg.c] = msg.player;
      moveHistory.push({ r: msg.r, c: msg.c, player: msg.player });
      lastMove = { r: msg.r, c: msg.c };
      currentTurn = msg.player === 1 ? 2 : 1;
      draw();
      updateStatus();
      SoundEngine.playStone();
      triggerCharacterPlay(msg.player);
      checkWin(msg.r, msg.c, msg.player);
      break;

    case 'undo_request':
      if (moveHistory.length >= 1) {
        const last = moveHistory.pop();
        board[last.r][last.c] = 0;
        currentTurn = last.player;
        lastMove = moveHistory.length > 0 ? moveHistory[moveHistory.length - 1] : null;
        gameOver = false;
        document.getElementById('overlay').classList.remove('show');
        draw();
        updateStatus();
        ws.send(JSON.stringify({ type: 'undo_done', board, currentTurn, moveHistory, lastMove }));
      }
      break;

    case 'undo_done':
      board = msg.board;
      currentTurn = msg.currentTurn;
      moveHistory = msg.moveHistory;
      lastMove = msg.lastMove;
      gameOver = false;
      document.getElementById('overlay').classList.remove('show');
      draw();
      updateStatus();
      break;

    case 'surrender':
      gameOver = true;
      SoundEngine.playWin();
      showSurrenderResult(msg.player);
      break;

    case 'restart_request':
      showConfirm('对方请求重新开始，是否同意？', () => {
        resetGame();
        ws.send(JSON.stringify({ type: 'restart_done' }));
      }, () => {
        ws.send(JSON.stringify({ type: 'restart_rejected' }));
      });
      break;

    case 'restart_done':
      resetGame();
      showToast('对方同意重新开始');
      break;

    case 'restart_rejected':
      showToast('对方拒绝了重新开始请求');
      break;

    case 'rematch':
      resetGame();
      showToast('对方发起了再来一局');
      break;

    case 'opponent_disconnected':
      opponentConnected = false;
      updateConnection(false);
      document.getElementById('connText').textContent = '对手已断开';
      SoundEngine.playDisconnect();
      break;

    case 'error':
      alert(msg.message);
      break;

    case 'emoji':
      showEmojiBubble(msg.emoji);
      break;
  }
}

function switchTab(tab) {
  document.querySelectorAll('.lobby-tab').forEach((t, i) => {
    t.classList.toggle('active', (tab === 'create' && i === 0) || (tab === 'join' && i === 1));
  });
  document.getElementById('panelCreate').classList.toggle('active', tab === 'create');
  document.getElementById('panelJoin').classList.toggle('active', tab === 'join');
}

function pickRole(role) {
  selectedRole = role;
  document.getElementById('choiceBlack').classList.toggle('selected', role === 1);
  document.getElementById('choiceWhite').classList.toggle('selected', role === 2);
}

function createRoom() {
  const btn = document.querySelector('#panelCreate .lobby-btn');
  btn.disabled = true;
  const msgEl = document.getElementById('createMsg');
  msgEl.textContent = '正在创建房间...';
  msgEl.className = 'lobby-msg';

  roomId = generateCode();
  myRole = selectedRole;
  ws.send(JSON.stringify({ type: 'create_room', roomId, role: myRole }));
}

function showRoomCreated(roomId) {
  const msgEl = document.getElementById('createMsg');
  msgEl.textContent = '';
  const createPanel = document.getElementById('panelCreate');
  createPanel.innerHTML = `
    <div class="section-label">房间已创建，将房间码发给好友</div>
    <div class="room-code-display">
      <div class="code">${roomId}</div>
      <div class="hint">将此房间码发送给你的朋友</div>
    </div>
    <button class="copy-btn" onclick="copyCode()">复制房间码</button>
    <div class="waiting-msg">等待好友加入<span class="dot-anim"></span></div>
  `;
  updateConnection(false);
  document.getElementById('connText').textContent = '等待对手加入...';
}

function joinRoom() {
  const code = document.getElementById('roomCodeInput').value.trim();
  const msgEl = document.getElementById('joinMsg');
  const btn = document.getElementById('joinBtn');

  if (!code) { msgEl.textContent = '请输入房间码'; msgEl.className = 'lobby-msg'; return; }

  btn.disabled = true;
  msgEl.textContent = '正在加入房间...';
  msgEl.className = 'lobby-msg';
  roomId = code;
  ws.send(JSON.stringify({ type: 'join_room', roomId: code }));
}

function copyCode() {
  navigator.clipboard.writeText(roomId).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '已复制！';
    setTimeout(() => { btn.textContent = '复制房间码'; }, 1500);
  });
}

function updateRoleBadge() {
  const badge = document.getElementById('roleBadge');
  if (!myCharacter) return;
  badge.className = myRole === 1 ? 'role-badge p1' : 'role-badge p2';
  const stone = myRole === 1 ? '黑棋' : '白棋';
  badge.textContent = '你是：' + myCharacter.name + '（' + stone + '）';
}

function updateConnection(online) {
  document.getElementById('connDot').className = online ? 'conn-dot online' : 'conn-dot';
  document.getElementById('connText').textContent = online ? '对手已连接' : '等待对手连接...';
  if (online) updateStatus();
}

function updateStatus() {
  const el = document.getElementById('status');
  const panelB = document.getElementById('panelBlack');
  const panelW = document.getElementById('panelWhite');
  if (gameOver) { el.textContent = ''; panelB.classList.remove('active-turn'); panelW.classList.remove('active-turn'); return; }
  el.textContent = '';
  if (currentTurn === 1) {
    panelB.classList.add('active-turn'); panelW.classList.remove('active-turn');
  } else {
    panelW.classList.add('active-turn'); panelB.classList.remove('active-turn');
  }
}

function updateCharacterDisplay() {
  if (myRole === 1) {
    if (myCharacter) {
      document.getElementById('avatarBlack').textContent = myCharacter.emoji;
      document.getElementById('nameBlack').textContent = myCharacter.name;
      document.getElementById('titleBlack').textContent = myCharacter.title;
    }
    if (opponentCharacter) {
      document.getElementById('avatarWhite').textContent = opponentCharacter.emoji;
      document.getElementById('nameWhite').textContent = opponentCharacter.name;
      document.getElementById('titleWhite').textContent = opponentCharacter.title;
    }
  } else {
    if (opponentCharacter) {
      document.getElementById('avatarBlack').textContent = opponentCharacter.emoji;
      document.getElementById('nameBlack').textContent = opponentCharacter.name;
      document.getElementById('titleBlack').textContent = opponentCharacter.title;
    }
    if (myCharacter) {
      document.getElementById('avatarWhite').textContent = myCharacter.emoji;
      document.getElementById('nameWhite').textContent = myCharacter.name;
      document.getElementById('titleWhite').textContent = myCharacter.title;
    }
  }
}

function triggerCharacterPlay(player) {
  const panelId = player === 1 ? 'panelBlack' : 'panelWhite';
  const avatarId = player === 1 ? 'avatarBlack' : 'avatarWhite';
  const panel = document.getElementById(panelId);
  const avatar = document.getElementById(avatarId);

  avatar.classList.remove('avatar-play');
  void avatar.offsetWidth;
  avatar.classList.add('avatar-play');

  setTimeout(() => {
    avatar.classList.remove('avatar-play');
  }, 600);

  if (Math.random() < 0.25) {
    const char = player === myRole ? myCharacter : opponentCharacter;
    if (char && char.lines && char.lines.length > 0) {
      const line = char.lines[Math.floor(Math.random() * char.lines.length)];
      showCharacterSpeech(panel, line);
    }
  }
}

function showCharacterSpeech(panel, text) {
  const existing = panel.querySelector('.char-speech-bubble');
  if (existing) existing.remove();

  const bubble = document.createElement('div');
  bubble.className = 'char-speech-bubble';
  bubble.textContent = text;
  panel.appendChild(bubble);

  setTimeout(() => {
    if (bubble.parentNode) bubble.parentNode.removeChild(bubble);
  }, 2500);
}

function showCharacterReveal(character) {
  const randomLine = character.lines[Math.floor(Math.random() * character.lines.length)];
  const overlay = document.createElement('div');
  overlay.className = 'char-reveal-overlay';
  overlay.innerHTML = `
    <div class="char-reveal-card">
      <div class="char-reveal-emoji">${character.emoji}</div>
      <div class="char-reveal-title">${character.title}</div>
      <div class="char-reveal-name">${character.name}</div>
      <div class="char-reveal-divider"></div>
      <div class="char-reveal-line">"${randomLine}"</div>
    </div>
    <div class="char-reveal-hint">点击任意处关闭</div>
  `;
  document.body.appendChild(overlay);
  const dismiss = () => {
    overlay.classList.add('fade-out');
    setTimeout(() => { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 500);
  };
  overlay.addEventListener('click', dismiss);
  setTimeout(dismiss, 3000);
}

function resetGame() {
  board = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
  currentTurn = 1;
  gameOver = false;
  moveHistory = [];
  lastMove = null;
  document.getElementById('overlay').classList.remove('show');
  document.querySelectorAll('.char-speech-bubble').forEach(b => b.remove());
  draw();
  updateStatus();
  SoundEngine.playRestart();
}

function draw() {
  ctx.clearRect(0, 0, INTERNAL_SIZE, INTERNAL_SIZE);
  ctx.fillStyle = '#d4a54a';
  ctx.fillRect(0, 0, INTERNAL_SIZE, INTERNAL_SIZE);

  ctx.strokeStyle = '#8b6914';
  ctx.lineWidth = 1;
  for (let i = 0; i < SIZE; i++) {
    const p = PADDING + i * CELL;
    ctx.beginPath(); ctx.moveTo(PADDING, p); ctx.lineTo(PADDING + (SIZE - 1) * CELL, p); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p, PADDING); ctx.lineTo(p, PADDING + (SIZE - 1) * CELL); ctx.stroke();
  }

  ctx.fillStyle = '#8b6914';
  for (const r of [3, 7, 11]) {
    for (const c of [3, 7, 11]) {
      ctx.beginPath();
      ctx.arc(PADDING + c * CELL, PADDING + r * CELL, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (board[r][c] !== 0) drawStone(r, c, board[r][c]);
    }
  }

  if (lastMove) {
    const x = PADDING + lastMove.c * CELL;
    const y = PADDING + lastMove.r * CELL;
    ctx.strokeStyle = '#e74c3c';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, 8, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawStone(r, c, player) {
  const x = PADDING + c * CELL;
  const y = PADDING + r * CELL;
  const radius = CELL * 0.43;
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 6;
  ctx.shadowOffsetX = 2;
  ctx.shadowOffsetY = 2;
  const grad = ctx.createRadialGradient(x - 4, y - 4, 2, x, y, radius);
  if (player === 1) {
    grad.addColorStop(0, '#555'); grad.addColorStop(1, '#111');
  } else {
    grad.addColorStop(0, '#fff'); grad.addColorStop(1, '#bbb');
  }
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

canvas.addEventListener('click', (e) => {
  if (gameOver || !opponentConnected || myRole === null) return;
  if (currentTurn !== myRole) return;

  const rect = canvas.getBoundingClientRect();
  const scaleX = INTERNAL_SIZE / rect.width;
  const scaleY = INTERNAL_SIZE / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  const c = Math.round((mx - PADDING) / CELL);
  const r = Math.round((my - PADDING) / CELL);
  if (r < 0 || r >= SIZE || c < 0 || c >= SIZE) return;
  if (board[r][c] !== 0) return;

  board[r][c] = myRole;
  moveHistory.push({ r, c, player: myRole });
  lastMove = { r, c };
  currentTurn = myRole === 1 ? 2 : 1;
  ws.send(JSON.stringify({ type: 'move', r, c, player: myRole }));
  draw();
  updateStatus();
  SoundEngine.playStone();
  triggerCharacterPlay(myRole);
  checkWin(r, c, myRole);
});

function checkWin(r, c, player) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of dirs) {
    let count = 1;
    for (let d = 1; d < 5; d++) {
      const nr = r + dr * d, nc = c + dc * d;
      if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] === player) count++; else break;
    }
    for (let d = 1; d < 5; d++) {
      const nr = r - dr * d, nc = c - dc * d;
      if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] === player) count++; else break;
    }
    if (count >= 5) { gameOver = true; showWin(player); return; }
  }
  let full = true;
  for (let i = 0; i < SIZE && full; i++) for (let j = 0; j < SIZE && full; j++) if (board[i][j] === 0) full = false;
  if (full) { gameOver = true; showDraw(); }
}

function showWin(player) {
  const isMe = player === myRole;
  if (isMe) SoundEngine.playWin();
  document.getElementById('winTitle').textContent = isMe ? '🎉 你赢了！' : '😔 你输了！';
  document.getElementById('winSub').textContent = `${player === 1 ? '黑棋' : '白棋'}获得胜利！`;
  document.getElementById('overlay').classList.add('show');
  updateStatus();
}

function showDraw() {
  document.getElementById('winTitle').textContent = '🤝 平局！';
  document.getElementById('winSub').textContent = '势均力敌，再来一局！';
  document.getElementById('overlay').classList.add('show');
  updateStatus();
}

function showSurrenderResult(surrenderPlayer) {
  const isMe = surrenderPlayer === myRole;
  const winner = surrenderPlayer === 1 ? 2 : 1;
  document.getElementById('winTitle').textContent = isMe ? '🏳️ 你认输了' : '🎉 对手认输了！';
  document.getElementById('winSub').textContent = isMe
    ? '胜败乃兵家常事，再来一局！'
    : `${winner === 1 ? '黑棋' : '白棋'}获得胜利！`;
  document.getElementById('overlay').classList.add('show');
  updateStatus();
}

function requestSurrender() {
  if (gameOver || !opponentConnected || myRole === null) return;
  showConfirm('确定要认输吗？', () => {
    gameOver = true;
    ws.send(JSON.stringify({ type: 'surrender', player: myRole }));
    showSurrenderResult(myRole);
  });
}

function requestUndo() {
  if (gameOver || moveHistory.length === 0) return;
  const lastMove = moveHistory[moveHistory.length - 1];
  if (lastMove.player !== myRole) return;
  if (currentTurn !== (myRole === 1 ? 2 : 1)) return;
  ws.send(JSON.stringify({ type: 'undo_request' }));
}

function requestRestart() {
  if (!opponentConnected) return;
  ws.send(JSON.stringify({ type: 'restart_request' }));
  showToast('已向对方发送重新开始请求，等待对方同意');
}

function requestRematch() {
  if (!opponentConnected) return;
  resetGame();
  ws.send(JSON.stringify({ type: 'rematch' }));
}

let lastEmojiTime = 0;
function sendEmoji(emoji) {
  if (!opponentConnected || myRole === null) return;
  const now = Date.now();
  if (now - lastEmojiTime < 1000) return;
  lastEmojiTime = now;
  showEmojiBubble(emoji);
  ws.send(JSON.stringify({ type: 'emoji', emoji: emoji }));
}

function showEmojiBubble(emoji) {
  const wrapper = document.querySelector('.board-wrapper');
  const bubble = document.createElement('div');
  bubble.className = 'emoji-bubble';
  bubble.textContent = emoji;
  wrapper.appendChild(bubble);
  setTimeout(() => {
    if (bubble.parentNode) bubble.parentNode.removeChild(bubble);
  }, 3000);
}

function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (8 + Math.random() * 12) + 's';
    p.style.animationDelay = Math.random() * 10 + 's';
    p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
    container.appendChild(p);
  }
}

function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 3000);
}

function showConfirm(msg, onYes, onNo) {
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.innerHTML = `<div class="confirm-card"><h3>${msg}</h3><div class="confirm-btns"><button class="btn-yes">同意</button><button class="btn-no">拒绝</button></div></div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('.btn-yes').onclick = () => { document.body.removeChild(overlay); if (onYes) onYes(); };
  overlay.querySelector('.btn-no').onclick = () => { document.body.removeChild(overlay); if (onNo) onNo(); };
}

draw();
createParticles();
connectServer();
</script>
</body>
