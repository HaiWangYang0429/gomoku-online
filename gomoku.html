<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>五子棋 - 联机对战</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cell: 40px;
  --padding: 20px;
  --board-size: calc(var(--cell) * 14 + var(--padding) * 2);
}

html { overflow-x: hidden; }

body {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  overflow-x: hidden;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 16px;
  width: 100%;
  max-width: 700px;
}

h1 {
  color: #fff;
  font-size: clamp(22px, 5vw, 36px);
  text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
  letter-spacing: 8px;
}

.info-bar {
  display: flex;
  align-items: center;
  gap: clamp(10px, 3vw, 30px);
  flex-wrap: wrap;
  justify-content: center;
}

.player-tag {
  display: flex;
  align-items: center;
  gap: clamp(4px, 1.5vw, 10px);
  padding: clamp(6px, 1.5vw, 10px) clamp(12px, 3vw, 24px);
  border-radius: 40px;
  font-size: clamp(12px, 2.5vw, 16px);
  font-weight: 600;
  color: #fff;
  transition: all 0.3s;
}

.player-tag.black {
  background: linear-gradient(135deg, #2d2d2d, #555);
  border: 2px solid #666;
}

.player-tag.white {
  background: linear-gradient(135deg, #e8e8e8, #fff);
  border: 2px solid #ccc;
  color: #333;
}

.player-tag.active {
  box-shadow: 0 0 20px rgba(255, 215, 0, 0.7);
  border-color: gold;
  transform: scale(1.08);
}

.stone-icon {
  width: clamp(14px, 3vw, 22px);
  height: clamp(14px, 3vw, 22px);
  border-radius: 50%;
  display: inline-block;
}

.stone-icon.black {
  background: radial-gradient(circle at 35% 35%, #555, #111);
  box-shadow: 1px 1px 3px rgba(0,0,0,0.5);
}

.stone-icon.white {
  background: radial-gradient(circle at 35% 35%, #fff, #ccc);
  box-shadow: 1px 1px 3px rgba(0,0,0,0.3);
}

#status {
  font-size: clamp(14px, 3vw, 20px);
  color: #ffd700;
  font-weight: 700;
  min-height: 24px;
  text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
}

.board-wrapper {
  position: relative;
  padding: clamp(10px, 2.5vw, 28px);
  border-radius: 12px;
  background: linear-gradient(145deg, #c6943e, #dbb060);
  box-shadow:
    0 10px 40px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.2),
    0 0 60px rgba(198, 148, 62, 0.3);
  max-width: 100%;
}

canvas {
  display: block;
  cursor: pointer;
  border-radius: 4px;
  width: min(640px, calc(100vw - 60px));
  height: min(640px, calc(100vw - 60px));
}

.btn-row {
  display: flex;
  gap: clamp(8px, 2vw, 16px);
  flex-wrap: wrap;
  justify-content: center;
}

button {
  padding: clamp(8px, 2vw, 12px) clamp(16px, 4vw, 36px);
  border: none;
  border-radius: 40px;
  font-size: clamp(12px, 2.5vw, 15px);
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 2px;
}

#restartBtn {
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #333;
  box-shadow: 0 4px 15px rgba(247, 151, 30, 0.4);
}

#restartBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(247, 151, 30, 0.6); }

#undoBtn {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
}

#undoBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6); }

#surrenderBtn {
  background: linear-gradient(135deg, #e74c3c, #c0392b);
  color: #fff;
  box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
}

#surrenderBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(231, 76, 60, 0.6); }

.role-badge {
  position: fixed;
  top: 10px;
  right: 10px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: clamp(10px, 2vw, 14px);
  font-weight: 600;
  color: #fff;
  z-index: 10;
}

.role-badge.p1 { background: linear-gradient(135deg, #e74c3c, #c0392b); }
.role-badge.p2 { background: linear-gradient(135deg, #3498db, #2980b9); }
.role-badge.waiting { background: linear-gradient(135deg, #95a5a6, #7f8c8d); }

.particles {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: -1;
}

.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 50%;
  animation: float linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
}

.overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
  z-index: 100;
  backdrop-filter: blur(4px);
  padding: 20px;
}

.overlay.show { display: flex; }

.win-card {
  background: linear-gradient(145deg, #1a1a2e, #16213e);
  padding: clamp(30px, 6vw, 50px) clamp(24px, 6vw, 60px);
  border-radius: 20px;
  text-align: center;
  border: 1px solid rgba(255,215,0,0.3);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  animation: popIn 0.4s ease;
  max-width: 400px;
  width: 100%;
}

@keyframes popIn {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

.win-card h2 { color: #ffd700; font-size: clamp(20px, 5vw, 32px); margin-bottom: 10px; }
.win-card p { color: #aaa; font-size: clamp(13px, 3vw, 16px); margin-bottom: 12px; }
.win-card button {
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #333;
  padding: 14px 48px;
  font-size: 16px;
}
.taunt-section {
  border-top: 1px solid rgba(255,215,0,0.15);
  margin: 12px 0 20px;
  padding-top: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.taunt-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  text-align: left;
  font-size: clamp(12px, 2.5vw, 14px);
  line-height: 1.5;
  animation: tauntFadeIn 0.5s ease both;
}
.taunt-row:nth-child(1) { animation-delay: 0.1s; }
.taunt-row:nth-child(2) { animation-delay: 0.3s; }
.taunt-row:nth-child(3) { animation-delay: 0.5s; }
@keyframes tauntFadeIn {
  0% { opacity: 0; transform: translateY(8px); }
  100% { opacity: 1; transform: translateY(0); }
}
.taunt-row .taunt-avatar {
  flex-shrink: 0;
  font-size: 20px;
  line-height: 1.2;
}
.taunt-row .taunt-text { color: #ccc; }
.taunt-row .taunt-name { color: #ffd700; font-weight: 700; }
.taunt-row.system-taunt {
  justify-content: center;
  text-align: center;
  border-top: 1px dashed rgba(255,215,0,0.1);
  padding-top: 10px;
  margin-top: 4px;
}
.taunt-row.system-taunt .taunt-text {
  color: #e74c3c;
  font-weight: 600;
  font-style: italic;
}
.taunt-row.winner-taunt {
  border-top: 1px dashed rgba(255,215,0,0.15);
  padding-top: 8px;
  margin-top: 2px;
}
.taunt-row.winner-taunt .taunt-text {
  color: #888;
  font-style: italic;
}
.taunt-row.winner-taunt .taunt-label {
  color: #666;
  font-size: clamp(10px, 2vw, 12px);
  display: block;
  margin-bottom: 4px;
}

.connection-status {
  position: fixed;
  top: 10px;
  left: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: clamp(10px, 2vw, 13px);
  color: #aaa;
  z-index: 10;
}

.conn-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #e74c3c;
  transition: background 0.3s;
}

.conn-dot.online { background: #2ecc71; }

.lobby-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.88);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 200;
  backdrop-filter: blur(8px);
  padding: 16px;
  overflow-y: auto;
}

.lobby-card {
  background: linear-gradient(145deg, #1a1a2e, #16213e);
  padding: clamp(24px, 5vw, 44px) clamp(20px, 5vw, 56px);
  border-radius: 20px;
  text-align: center;
  border: 1px solid rgba(255,215,0,0.3);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  animation: popIn 0.4s ease;
  width: 100%;
  max-width: 420px;
}

.lobby-card h2 {
  color: #fff;
  font-size: clamp(20px, 5vw, 28px);
  margin-bottom: 6px;
  letter-spacing: 4px;
}

.lobby-card .subtitle {
  color: #888;
  font-size: clamp(11px, 2.5vw, 14px);
  margin-bottom: 24px;
}

.lobby-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 24px;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.1);
}

.lobby-tab {
  flex: 1;
  padding: 12px 0;
  font-size: clamp(13px, 2.5vw, 15px);
  font-weight: 600;
  color: #888;
  background: rgba(255,255,255,0.03);
  cursor: pointer;
  transition: all 0.3s;
  border: none;
  letter-spacing: 1px;
}

.lobby-tab.active {
  color: #fff;
  background: rgba(255,215,0,0.12);
}

.lobby-panel { display: none; }
.lobby-panel.active { display: block; }

.lobby-panel .section-label {
  color: #aaa;
  font-size: 13px;
  margin-bottom: 12px;
}

.room-code-display {
  background: rgba(255,215,0,0.1);
  border: 2px dashed rgba(255,215,0,0.4);
  border-radius: 12px;
  padding: 16px 24px;
  margin-bottom: 16px;
}

.room-code-display .code {
  font-size: clamp(24px, 6vw, 32px);
  font-weight: 800;
  color: #ffd700;
  letter-spacing: 6px;
  font-family: 'Courier New', monospace;
}

.room-code-display .hint {
  font-size: 12px;
  color: #888;
  margin-top: 6px;
}

.role-select-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 20px;
}

.role-choice {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: clamp(12px, 3vw, 16px) clamp(16px, 4vw, 28px);
  border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.03);
  cursor: pointer;
  transition: all 0.3s;
}

.role-choice:hover { border-color: rgba(255,215,0,0.3); }

.role-choice.selected {
  border-color: gold;
  background: rgba(255,215,0,0.1);
  box-shadow: 0 0 20px rgba(255,215,0,0.15);
}

.role-choice .stone-sm {
  width: 36px;
  height: 36px;
  border-radius: 50%;
}

.role-choice .stone-sm.black {
  background: radial-gradient(circle at 35% 35%, #555, #111);
  box-shadow: 1px 1px 4px rgba(0,0,0,0.5);
}

.role-choice .stone-sm.white {
  background: radial-gradient(circle at 35% 35%, #fff, #bbb);
  box-shadow: 1px 1px 4px rgba(0,0,0,0.3);
}

.role-choice .role-label {
  color: #fff;
  font-size: 14px;
  font-weight: 600;
}

.lobby-input {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 14px 20px;
  font-size: clamp(18px, 4vw, 22px);
  font-weight: 700;
  color: #fff;
  text-align: center;
  letter-spacing: 6px;
  width: 100%;
  max-width: 200px;
  font-family: 'Courier New', monospace;
  outline: none;
  text-transform: uppercase;
  transition: border-color 0.3s;
  margin-bottom: 16px;
}

.lobby-input:focus { border-color: rgba(255,215,0,0.5); }

.lobby-input::placeholder {
  color: rgba(255,255,255,0.2);
  letter-spacing: 2px;
  font-size: 14px;
  font-weight: 400;
}

.lobby-btn {
  padding: 14px 44px;
  border: none;
  border-radius: 40px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 2px;
}

.lobby-btn.primary {
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #333;
  box-shadow: 0 4px 15px rgba(247, 151, 30, 0.4);
}

.lobby-btn.primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(247, 151, 30, 0.6);
}

.lobby-btn.primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.lobby-msg {
  font-size: 13px;
  color: #e74c3c;
  margin-top: 12px;
  min-height: 20px;
}

.lobby-msg.success { color: #2ecc71; }

.waiting-msg {
  color: #aaa;
  font-size: 14px;
  margin-top: 12px;
}

.waiting-msg .dot-anim::after {
  content: '';
  animation: dots 1.5s steps(4, end) infinite;
}

@keyframes dots {
  0% { content: ''; }
  25% { content: '.'; }
  50% { content: '..'; }
  75% { content: '...'; }
}

.room-id-display {
  position: fixed;
  top: 40px;
  right: 10px;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: clamp(9px, 2vw, 12px);
  color: #888;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  z-index: 10;
}

.hidden { display: none !important; }

.copy-btn {
  background: none;
  border: 1px solid rgba(255,215,0,0.3);
  color: #ffd700;
  padding: 6px 16px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}

.copy-btn:hover { background: rgba(255,215,0,0.1); }

.server-status {
  position: fixed;
  bottom: 10px;
  left: 10px;
  font-size: clamp(9px, 2vw, 12px);
  color: #666;
}

@media (max-width: 480px) {
  .container { gap: 10px; padding: 10px; }
  .board-wrapper { padding: 8px; }
  canvas {
    width: calc(100vw - 36px);
    height: calc(100vw - 36px);
  }
  .btn-row { gap: 6px; }
  button { padding: 8px 16px; font-size: 12px; letter-spacing: 1px; }
  .item-btn { padding: 4px 8px; }
  .item-bar { gap: 6px; }
  .lobby-card { padding: 20px 16px; }
  .role-select-row { gap: 8px; }
  .role-choice { padding: 12px 16px; }
}

.item-bar {
  display: flex;
  gap: clamp(8px, 2vw, 16px);
  flex-wrap: wrap;
  justify-content: center;
}
.item-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  background: rgba(255,255,255,0.08);
  border: none;
  border-radius: 12px;
  padding: clamp(6px, 1.5vw, 10px) clamp(10px, 2vw, 16px);
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  letter-spacing: 0;
}
.item-btn:hover { transform: scale(1.1); background: rgba(255,255,255,0.15); }
.item-btn:active { transform: scale(0.95); }
.item-btn.selected { border: 2px solid #ffd700; background: rgba(255,215,0,0.15); box-shadow: 0 0 12px rgba(255,215,0,0.3); }
.item-emoji { font-size: clamp(22px, 5vw, 32px); line-height: 1; }
.item-name { font-size: clamp(9px, 2vw, 11px); color: #aaa; font-weight: 600; letter-spacing: 0; }
.item-badge {
  position: absolute;
  top: -4px; right: -4px;
  background: linear-gradient(135deg, #e74c3c, #c0392b);
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 4px;
  border-radius: 6px;
  letter-spacing: 0;
}
.item-hint {
  color: #666;
  font-size: clamp(10px, 2vw, 12px);
  text-align: center;
  margin-top: 2px;
}

.projectile-layer {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 500;
  overflow: hidden;
}
.flying-item {
  position: absolute;
  font-size: clamp(28px, 6vw, 44px);
  pointer-events: none;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
  will-change: transform;
  z-index: 501;
}
.flying-tomato { animation: flySpin 0.6s linear; }
.flying-squid { animation: flyWobble 0.8s ease-in-out; }
.flying-turtle { animation: flyFlip 1.2s ease-in-out; }
.flying-sword { animation: flyStreak 0.4s linear; }
.flying-nuke { animation: flyPulse 1.5s ease-in-out; }
@keyframes flySpin { from { transform: rotate(0deg); } to { transform: rotate(720deg); } }
@keyframes flyWobble {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-15px) rotate(10deg); }
  75% { transform: translateY(15px) rotate(-10deg); }
}
@keyframes flyFlip { from { transform: rotateY(0deg); } to { transform: rotateY(720deg); } }
@keyframes flyStreak {
  0% { transform: scaleX(1); filter: drop-shadow(0 0 0 rgba(255,255,255,0)); }
  50% { transform: scaleX(2); filter: drop-shadow(0 0 12px rgba(255,255,255,0.9)); }
  100% { transform: scaleX(1); filter: drop-shadow(0 0 0 rgba(255,255,255,0)); }
}
@keyframes flyPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.5); } }

.impact { position: absolute; pointer-events: none; z-index: 502; }
.impact-particle {
  position: absolute;
  border-radius: 50%;
  animation: particleFly 0.6s ease-out forwards;
}
@keyframes particleFly {
  0% { transform: translate(0,0) scale(1); opacity:1; }
  100% { transform: translate(var(--dx), var(--dy)) scale(0.2); opacity:0; }
}
.impact-splat {
  position: absolute;
  border-radius: 50%;
  animation: splatExpand 0.5s ease-out forwards;
}
@keyframes splatExpand {
  0% { transform: translate(-50%,-50%) scale(0); opacity:0.9; }
  100% { transform: translate(-50%,-50%) scale(3); opacity:0; }
}
.impact-ink {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(20,20,40,0.85), rgba(40,40,80,0.4), transparent);
  animation: inkSpread 1.5s ease-out forwards;
}
@keyframes inkSpread {
  0% { transform: translate(-50%,-50%) scale(0); opacity:1; }
  60% { transform: translate(-50%,-50%) scale(2.5); opacity:0.5; }
  100% { transform: translate(-50%,-50%) scale(3.5); opacity:0; }
}
.impact-slash {
  position: absolute;
  width: 80px; height: 4px;
  background: linear-gradient(90deg, transparent, #fff, #ffd700, #fff, transparent);
  animation: slashFade 0.4s ease-out forwards;
}
@keyframes slashFade {
  0% { transform: translate(-50%,-50%) scaleX(0); opacity:1; }
  50% { transform: translate(-50%,-50%) scaleX(1.5); opacity:1; }
  100% { transform: translate(-50%,-50%) scaleX(2); opacity:0; }
}
.nuke-flash {
  position: fixed; top:0; left:0; width:100%; height:100%;
  pointer-events: none; z-index: 499;
  animation: nukeFlash 0.8s ease-out forwards;
}
@keyframes nukeFlash {
  0% { background: rgba(255,200,50,0.8); }
  30% { background: rgba(255,100,50,0.4); }
  100% { background: transparent; }
}
.impact-shockwave {
  position: absolute;
  border: 3px solid rgba(255,150,50,0.8);
  border-radius: 50%;
  animation: shockwaveExpand 1s ease-out forwards;
}
@keyframes shockwaveExpand {
  0% { width:0; height:0; transform: translate(-50%,-50%); opacity:1; }
  100% { width:200px; height:200px; transform: translate(-50%,-50%); opacity:0; }
}
.screen-shake { animation: screenShake 0.5s ease-out; }
@keyframes screenShake {
  0%, 100% { transform: translate(0,0); }
  10% { transform: translate(-8px, 4px); }
  20% { transform: translate(8px, -4px); }
  30% { transform: translate(-6px, 6px); }
  40% { transform: translate(6px, -2px); }
  50% { transform: translate(-4px, 4px); }
  60% { transform: translate(4px, -4px); }

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function pickSeeded(arr, seed) {
  let h = 0;
  for (let i = 0; i < seed.length; i++) {
    h = ((h << 5) - h + seed.charCodeAt(i)) | 0;
  }
  return arr[Math.abs(h) % arr.length];
}

function throwProjectile(itemType, targetAvatarEl) {
  const item = ITEMS[itemType];
  if (!item) return;
  const layer = document.getElementById('projectileLayer');
  const targetRect = targetAvatarEl.getBoundingClientRect();
  const targetX = targetRect.left + targetRect.width / 2;
  const targetY = targetRect.top + targetRect.height / 2;

  const el = document.createElement('div');
  el.className = 'flying-item ' + item.flyClass;
  el.textContent = item.emoji;
  layer.appendChild(el);

  if (itemType === 'sword') {
    const swordBtn = document.querySelector('[data-item="sword"]');
    const btnRect = swordBtn.getBoundingClientRect();
    const startX = btnRect.left + btnRect.width / 2;
    const startY = btnRect.top + btnRect.height / 2;

    const boardEl = document.getElementById('board');
    const boardRect = boardEl.getBoundingClientRect();
    const cx = boardRect.left + boardRect.width / 2;
    const cy = boardRect.top + boardRect.height / 2;
    const rx = boardRect.width / 2 + 40;
    const ry = boardRect.height / 2 + 40;

    el.style.left = '0px';
    el.style.top = '0px';

    const keyframes = [];
    const totalSteps = 32;
    const toBoard = 4;
    const orbit = 24;
    const toTarget = 4;

    for (let i = 0; i <= toBoard; i++) {
      const progress = i / toBoard;
      const x = startX + (cx + rx - startX) * progress;
      const y = startY + (cy - startY) * progress;
      keyframes.push({
        transform: `translate(${x - 22}px, ${y - 22}px) rotate(${progress * 90}deg) scale(1.1)`,
        offset: (i * totalSteps) / (toBoard + orbit + toTarget) / totalSteps * totalSteps / totalSteps
      });
    }
    keyframes[keyframes.length - 1].offset = toBoard / (toBoard + orbit + toTarget);

    for (let i = 1; i <= orbit; i++) {
      const angle = (Math.PI * 2 * i) / orbit;
      const x = cx + rx * Math.cos(angle);
      const y = cy + ry * Math.sin(angle);
      const rot = 90 + (360 * i) / orbit;
      keyframes.push({
        transform: `translate(${x - 22}px, ${y - 22}px) rotate(${rot}deg) scale(1.1)`,
        offset: (toBoard + i) / (toBoard + orbit + toTarget)
      });
    }

    const orbitEndX = cx + rx;
    const orbitEndY = cy;
    for (let i = 1; i <= toTarget; i++) {
      const progress = i / toTarget;
      const x = orbitEndX + (targetX - orbitEndX) * progress;
      const y = orbitEndY + (targetY - orbitEndY) * progress;
      const rot = 450 + progress * 180;
      const scale = 1.1 + progress * 0.3;
      keyframes.push({
        transform: `translate(${x - 22}px, ${y - 22}px) rotate(${rot}deg) scale(${scale})`,
        offset: (toBoard + orbit + i) / (toBoard + orbit + toTarget)
      });
    }

    el.animate(keyframes, {
      duration: 1200,
      easing: 'cubic-bezier(0.4, 0, 0.2, 1)',
      fill: 'forwards'
    }).onfinish = () => {
      el.remove();
      createImpact(itemType, targetX, targetY, targetAvatarEl);
    };
  } else {
    const startX = targetX + (Math.random() - 0.5) * 300;
    const startY = window.innerHeight + 50;
    el.style.left = '0px';
    el.style.top = '0px';

    const dx = targetX - startX;
    const dy = targetY - startY;
    el.animate([
      { transform: `translate(${startX - 22}px, ${startY - 22}px) scale(1)` },
      { transform: `translate(${startX + dx * 0.5 - 22}px, ${startY + dy * 0.5 - 80 - 22}px) scale(1.2)`, offset: 0.4 },
      { transform: `translate(${targetX - 22}px, ${targetY - 22}px) scale(1)` }
    ], {
      duration: item.duration,
      easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
      fill: 'forwards'
    }).onfinish = () => {
      el.remove();
      createImpact(itemType, targetX, targetY, targetAvatarEl);
    };
  }
}

function onOpponentAvatarClick() {
  if (!selectedItem || !opponentConnected || !myRole) return;
  const now = Date.now();
  if (now - lastProjectileTime < 300) return;
  lastProjectileTime = now;

  const item = ITEMS[selectedItem];
  const targetAvatar = getOpponentAvatarEl();
  const count = item.multi;

  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      throwProjectile(selectedItem, targetAvatar);
      ws.send(JSON.stringify({ type: 'projectile', item: selectedItem }));
    }, i * item.multiDelay);
  }
}

const SoundEngine = {
  ctx: null,
  initialized: false,
  init() {
    if (this.initialized) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.initialized = true;
  },
  playStone() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const bufferSize = this.ctx.sampleRate * 0.05;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 3);
    }
    const noise = this.ctx.createBufferSource();
    noise.buffer = buffer;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 800;
    filter.Q.value = 1.5;
    const noiseGain = this.ctx.createGain();
    noiseGain.gain.setValueAtTime(0.6, t);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    noise.connect(filter).connect(noiseGain).connect(this.ctx.destination);
    noise.start(t);
    noise.stop(t + 0.08);
    const osc = this.ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(180, t);
    osc.frequency.exponentialRampToValueAtTime(60, t + 0.1);
    const oscGain = this.ctx.createGain();
    oscGain.gain.setValueAtTime(0.5, t);
    oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc.connect(oscGain).connect(this.ctx.destination);
    osc.start(t);
    osc.stop(t + 0.15);
  },
  playWin() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const notes = [523.25, 659.25, 783.99, 1046.50];
    notes.forEach((freq, i) => {
      const osc = this.ctx.createOscillator();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const gain = this.ctx.createGain();
      const start = t + i * 0.15;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.35, start + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, start + 0.4);
      osc.connect(gain).connect(this.ctx.destination);
      osc.start(start);
      osc.stop(start + 0.4);
    });
  },
  playDisconnect() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const notes = [880, 660];
    notes.forEach((freq, i) => {
      const osc = this.ctx.createOscillator();
      osc.type = 'square';
      osc.frequency.value = freq;
      const gain = this.ctx.createGain();
      const start = t + i * 0.2;
      gain.gain.setValueAtTime(0.15, start);
      gain.gain.exponentialRampToValueAtTime(0.001, start + 0.15);
      osc.connect(gain).connect(this.ctx.destination);
      osc.start(start);
      osc.stop(start + 0.15);
    });
  },
  playRestart() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(300, t);
    osc.frequency.exponentialRampToValueAtTime(900, t + 0.25);
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.25, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.connect(gain).connect(this.ctx.destination);
    osc.start(t);
    osc.stop(t + 0.3);
  }
};

function initSoundOnGesture() {
  SoundEngine.init();
  document.removeEventListener('click', initSoundOnGesture);
  document.removeEventListener('touchstart', initSoundOnGesture);
}

function generateCode() {
  let code = '';
  for (let i = 0; i < 4; i++) code += Math.floor(Math.random() * 10);
  return code;
}

function connectServer() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${protocol}//${location.host}`);

  ws.onopen = () => {
    document.getElementById('serverStatus').textContent = '服务器: 已连接';
  };

  ws.onmessage = (e) => handleMessage(JSON.parse(e.data));

  ws.onclose = () => {
    document.getElementById('serverStatus').textContent = '服务器: 已断开';
    setTimeout(connectServer, 3000);
  };

  ws.onerror = () => {};
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'room_created':
      myCharacter = msg.character;
      showRoomCreated(msg.roomId, msg.role);
      break;

    case 'guest_joined':
      opponentConnected = true;
      opponentCharacter = msg.opponentCharacter;
      updateCharacterDisplay();
      updateConnection(true);
      updateRoleBadge();
      updateOpponentTarget();
      document.getElementById('lobbyOverlay').classList.add('hidden');
      showCharacterReveal(myCharacter);
      draw();
      updateStatus();
      break;

    case 'room_joined':
      myRole = msg.role;
      myCharacter = msg.character;
      opponentCharacter = msg.opponentCharacter;
      opponentConnected = true;
      updateCharacterDisplay();
      updateConnection(true);
      updateRoleBadge();
      updateOpponentTarget();
      document.getElementById('roomIdDisplay').textContent = '房间: ' + msg.roomId;
      document.getElementById('roomIdDisplay').classList.remove('hidden');
      document.getElementById('lobbyOverlay').classList.add('hidden');
      showCharacterReveal(myCharacter);
      draw();
      updateStatus();
      break;

    case 'move':
      board[msg.r][msg.c] = msg.player;
      moveHistory.push({ r: msg.r, c: msg.c, player: msg.player });
      lastMove = { r: msg.r, c: msg.c };
      currentTurn = msg.player === 1 ? 2 : 1;
      draw();
      updateStatus();
      SoundEngine.playStone();
      triggerCharacterPlay(msg.player, msg.line);
      checkWin(msg.r, msg.c, msg.player);
      break;

    case 'undo_request':
      if (moveHistory.length >= 1) {
        const last = moveHistory.pop();
        board[last.r][last.c] = 0;
        currentTurn = last.player;
        lastMove = moveHistory.length > 0 ? moveHistory[moveHistory.length - 1] : null;
        gameOver = false;
        document.getElementById('overlay').classList.remove('show');
        draw();
        updateStatus();
        ws.send(JSON.stringify({ type: 'undo_done', board, currentTurn, moveHistory, lastMove }));
      }
      break;

    case 'undo_done':
      board = msg.board;
      currentTurn = msg.currentTurn;
      moveHistory = msg.moveHistory;
      lastMove = msg.lastMove;
      gameOver = false;
      document.getElementById('overlay').classList.remove('show');
      draw();
      updateStatus();
      break;

    case 'surrender':
      gameOver = true;
      SoundEngine.playWin();
      showSurrenderResult(msg.player, msg.taunt);
      break;

    case 'restart_request':
      showConfirm('对方请求重新开始，是否同意？', () => {
        resetGame();
        ws.send(JSON.stringify({ type: 'restart_done' }));
      }, () => {
        ws.send(JSON.stringify({ type: 'restart_rejected' }));
      });
      break;

    case 'restart_done':
      resetGame();
      showToast('对方同意重新开始');
      break;

    case 'restart_rejected':
      showToast('对方拒绝了重新开始请求');
      break;

    case 'rematch':
      resetGame();
      showToast('对方发起了再来一局');
      break;

    case 'opponent_disconnected':
      opponentConnected = false;
      updateConnection(false);
      updateOpponentTarget();
      document.getElementById('connText').textContent = '对手已断开';
      SoundEngine.playDisconnect();
      break;

    case 'error':
      alert(msg.message);
      break;

    case 'projectile':
      receiveProjectile(msg.item);
      break;
  }
}

function receiveProjectile(itemType) {
  const targetAvatar = getMyAvatarEl();
  throwProjectile(itemType, targetAvatar);
}

function updateStatus() {
  const el = document.getElementById('status');
  const panelB = document.getElementById('panelBlack');
  const panelW = document.getElementById('panelWhite');
  if (gameOver) { el.textContent = ''; panelB.classList.remove('active-turn'); panelW.classList.remove('active-turn'); return; }
  el.textContent = '';
  if (currentTurn === 1) {
    panelB.classList.add('active-turn'); panelW.classList.remove('active-turn');
  } else {
    panelW.classList.add('active-turn'); panelB.classList.remove('active-turn');
  }
}

      document.getElementById('avatarBlack').textContent = myCharacter.emoji;
      document.getElementById('nameBlack').textContent = myCharacter.name;
      document.getElementById('titleBlack').textContent = myCharacter.title;
    }

      document.getElementById('avatarWhite').textContent = opponentCharacter.emoji;
      document.getElementById('nameWhite').textContent = opponentCharacter.name;
      document.getElementById('titleWhite').textContent = opponentCharacter.title;
    }
  } else {

      document.getElementById('avatarBlack').textContent = opponentCharacter.emoji;
      document.getElementById('nameBlack').textContent = opponentCharacter.name;
      document.getElementById('titleBlack').textContent = opponentCharacter.title;
    }
    if (myCharacter) {
      document.getElementById('avatarWhite').textContent = myCharacter.emoji;
      document.getElementById('nameWhite').textContent = myCharacter.name;
      document.getElementById('titleWhite').textContent = myCharacter.title;
    }
  }
}

function triggerCharacterPlay(player, line) {
  const panelId = player === 1 ? 'panelBlack' : 'panelWhite';
  const avatarId = player === 1 ? 'avatarBlack' : 'avatarWhite';
  const panel = document.getElementById(panelId);
  const avatar = document.getElementById(avatarId);

  avatar.classList.remove('avatar-play');
  void avatar.offsetWidth;
  avatar.classList.add('avatar-play');

  setTimeout(() => {
    avatar.classList.remove('avatar-play');
  }, 600);

  if (line) {
    showCharacterSpeech(panel, line);
  }
}

function showCharacterSpeech(panel, text) {
  const existing = panel.querySelector('.char-speech-bubble');
  if (existing) existing.remove();

  const bubble = document.createElement('div');
  bubble.className = 'char-speech-bubble';
  bubble.textContent = text;
  panel.appendChild(bubble);

  setTimeout(() => {
    if (bubble.parentNode) bubble.parentNode.removeChild(bubble);
  }, 2500);
}

function showCharacterReveal(character) {
  const randomLine = character.lines[Math.floor(Math.random() * character.lines.length)];
  const overlay = document.createElement('div');
  overlay.className = 'char-reveal-overlay';
  overlay.innerHTML = `
    <div class="char-reveal-card">
      <div class="char-reveal-emoji">${character.emoji}</div>
      <div class="char-reveal-title">${character.title}</div>
      <div class="char-reveal-name">${character.name}</div>
      <div class="char-reveal-divider"></div>
      <div class="char-reveal-line">"${randomLine}"</div>
    </div>
    <div class="char-reveal-hint">点击任意处关闭</div>
  `;
  document.body.appendChild(overlay);
  const dismiss = () => {
    overlay.classList.add('fade-out');
    setTimeout(() => { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 500);
  };
  overlay.addEventListener('click', dismiss);
  setTimeout(dismiss, 3000);
}

function resetGame() {
  board = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
  currentTurn = 1;
  gameOver = false;
  moveHistory = [];
  lastMove = null;
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('tauntSection').innerHTML = '';
  document.querySelectorAll('.char-speech-bubble').forEach(b => b.remove());
  draw();
  updateStatus();
  SoundEngine.playRestart();
}

function draw() {
  ctx.clearRect(0, 0, INTERNAL_SIZE, INTERNAL_SIZE);
  ctx.fillStyle = '#d4a54a';
  ctx.fillRect(0, 0, INTERNAL_SIZE, INTERNAL_SIZE);

  ctx.strokeStyle = '#8b6914';
  ctx.lineWidth = 1;
  for (let i = 0; i < SIZE; i++) {
    const p = PADDING + i * CELL;
    ctx.beginPath(); ctx.moveTo(PADDING, p); ctx.lineTo(PADDING + (SIZE - 1) * CELL, p); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p, PADDING); ctx.lineTo(p, PADDING + (SIZE - 1) * CELL); ctx.stroke();
  }

  ctx.fillStyle = '#8b6914';
  for (const r of [3, 7, 11]) {
    for (const c of [3, 7, 11]) {
      ctx.beginPath();
      ctx.arc(PADDING + c * CELL, PADDING + r * CELL, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (board[r][c] !== 0) drawStone(r, c, board[r][c]);
    }
  }

  if (lastMove) {
    const x = PADDING + lastMove.c * CELL;
    const y = PADDING + lastMove.r * CELL;
    ctx.strokeStyle = '#e74c3c';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, 8, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawStone(r, c, player) {
  const x = PADDING + c * CELL;
  const y = PADDING + r * CELL;
  const radius = CELL * 0.43;
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 6;
  ctx.shadowOffsetX = 2;
  ctx.shadowOffsetY = 2;
  const grad = ctx.createRadialGradient(x - 4, y - 4, 2, x, y, radius);
  if (player === 1) {
    grad.addColorStop(0, '#555'); grad.addColorStop(1, '#111');
  } else {
    grad.addColorStop(0, '#fff'); grad.addColorStop(1, '#bbb');
  }
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

canvas.addEventListener('click', (e) => {
  if (gameOver || !opponentConnected || myRole === null) return;
  if (currentTurn !== myRole) return;

  const rect = canvas.getBoundingClientRect();
  const scaleX = INTERNAL_SIZE / rect.width;
  const scaleY = INTERNAL_SIZE / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  const c = Math.round((mx - PADDING) / CELL);
  const r = Math.round((my - PADDING) / CELL);
  if (r < 0 || r >= SIZE || c < 0 || c >= SIZE) return;
  if (board[r][c] !== 0) return;

  board[r][c] = myRole;
  moveHistory.push({ r, c, player: myRole });
  lastMove = { r, c };
  currentTurn = myRole === 1 ? 2 : 1;
  let speechLine = null;
  if (Math.random() < 0.25 && myCharacter && myCharacter.lines.length > 0) {
    speechLine = myCharacter.lines[Math.floor(Math.random() * myCharacter.lines.length)];
  }
  ws.send(JSON.stringify({ type: 'move', r, c, player: myRole, line: speechLine }));
  draw();
  updateStatus();
  SoundEngine.playStone();
  triggerCharacterPlay(myRole, speechLine);
  checkWin(r, c, myRole);
});

function checkWin(r, c, player) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of dirs) {
    let count = 1;
    for (let d = 1; d < 5; d++) {
      const nr = r + dr * d, nc = c + dc * d;
      if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] === player) count++; else break;
    }
    for (let d = 1; d < 5; d++) {
      const nr = r - dr * d, nc = c - dc * d;
      if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] === player) count++; else break;
    }
    if (count >= 5) { gameOver = true; showWin(player); return; }
  }
  let full = true;
  for (let i = 0; i < SIZE && full; i++) for (let j = 0; j < SIZE && full; j++) if (board[i][j] === 0) full = false;
  if (full) { gameOver = true; showDraw(); }
}

function getCharByRole(role) {
  if (role === myRole) return myCharacter;
  return opponentCharacter;
}

function buildTauntHTML(char, tauntText) {
  if (!char || !tauntText) return '';
  return `<div class="taunt-row"><span class="taunt-avatar">${char.emoji}</span><span class="taunt-text"><span class="taunt-name">${char.name}：</span>${tauntText}</span></div>`;
}

function buildWinnerTauntHTML(tauntText) {
  if (!tauntText) return '';
  return `<div class="taunt-row winner-taunt"><span class="taunt-text"><span class="taunt-label">对方已收到你的慰问：</span>${tauntText}</span></div>`;
}

function showWin(player) {
  const isMe = player === myRole;
  if (isMe) SoundEngine.playWin();
  document.getElementById('winTitle').textContent = isMe ? '🎉 你赢了！' : '😔 你输了！';
  document.getElementById('winSub').textContent = `${player === 1 ? '黑棋' : '白棋'}获得胜利！`;
  const winnerChar = getCharByRole(player);
  const seed = lastMove ? `${lastMove.r}_${lastMove.c}_${player}` : `${player}`;
  const tauntText = pickSeeded(KILL_TAUNTS, seed);
  if (isMe) {
    document.getElementById('tauntSection').innerHTML = buildWinnerTauntHTML(tauntText);
  } else {
    document.getElementById('tauntSection').innerHTML = buildTauntHTML(winnerChar, tauntText);
  }
  document.getElementById('overlay').classList.add('show');
  updateStatus();
}

function showDraw() {
  document.getElementById('winTitle').textContent = '🤝 平局！';
  document.getElementById('winSub').textContent = '势均力敌，再来一局！';
  const seed = lastMove ? `${lastMove.r}_${lastMove.c}` : 'draw';
  const tauntText = pickSeeded(DRAW_TAUNTS, seed);
  document.getElementById('tauntSection').innerHTML = buildTauntHTML(myCharacter, tauntText);
  document.getElementById('overlay').classList.add('show');
  updateStatus();
}

function showSurrenderResult(surrenderPlayer, tauntText) {
  const isMe = surrenderPlayer === myRole;
  const winner = surrenderPlayer === 1 ? 2 : 1;
  document.getElementById('winTitle').textContent = isMe ? '🏳️ 你认输了' : '🎉 对手认输了！';
  document.getElementById('winSub').textContent = isMe
    ? ''
    : `${winner === 1 ? '黑棋' : '白棋'}获得胜利！`;
  const text = tauntText || pickRandom(SURRENDER_TAUNTS);
  const winnerChar = getCharByRole(winner);
  if (isMe) {
    document.getElementById('tauntSection').innerHTML = buildTauntHTML(winnerChar, text);
  } else {
    document.getElementById('tauntSection').innerHTML = buildWinnerTauntHTML(text);
  }
  document.getElementById('overlay').classList.add('show');
  updateStatus();
}

function requestSurrender() {
  if (gameOver || !opponentConnected || myRole === null) return;
  showConfirm('确定要认输吗？', () => {
    gameOver = true;
    const tauntText = pickRandom(SURRENDER_TAUNTS);
    ws.send(JSON.stringify({ type: 'surrender', player: myRole, taunt: tauntText }));
    showSurrenderResult(myRole, tauntText);
  });
}

function requestUndo() {
  if (gameOver || moveHistory.length === 0) return;
  const lastMove = moveHistory[moveHistory.length - 1];
  if (lastMove.player !== myRole) return;
  if (currentTurn !== (myRole === 1 ? 2 : 1)) return;
  ws.send(JSON.stringify({ type: 'undo_request' }));
}

function requestRestart() {
  if (!opponentConnected) return;
  ws.send(JSON.stringify({ type: 'restart_request' }));
  showToast('已向对方发送重新开始请求，等待对方同意');
}

function requestRematch() {
  if (!opponentConnected) return;
  resetGame();
  ws.send(JSON.stringify({ type: 'rematch' }));
}

function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (8 + Math.random() * 12) + 's';
    p.style.animationDelay = Math.random() * 10 + 's';
    p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
    container.appendChild(p);
  }
}

function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 3000);
}

function showConfirm(msg, onYes, onNo) {
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.innerHTML = `<div class="confirm-card"><h3>${msg}</h3><div class="confirm-btns"><button class="btn-yes">同意</button><button class="btn-no">拒绝</button></div></div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('.btn-yes').onclick = () => { document.body.removeChild(overlay); if (onYes) onYes(); };
  overlay.querySelector('.btn-no').onclick = () => { document.body.removeChild(overlay); if (onNo) onNo(); };
}

draw();
createParticles();
connectServer();
</script>
</body>
